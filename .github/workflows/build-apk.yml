name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew :androidApp:assembleDebug -x spotlessApply -x spotlessCheck -x :screenshotTests:test --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mimicops-debug
          path: androidApp/build/outputs/apk/debug/*.apk
          retention-days: 30
